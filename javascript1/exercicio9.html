<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 9</title>

</head>
<body>

    <section>

    <div id="container">

        <h1>Média final</h1>

        <form>
            <input type="number" id="num1" placeholder="Nota 1"><br/>
            <input type="number" id="num2" placeholder="Nota 2"><br/>
            <input type="number" id="num3" placeholder="Nota 3"><br/>
        </form>

        <button id="calcular">Calcular</button>

        <div id="resultado"></div>

    </div>  

    </section>
   
</body>
        <script>
            document.getElementById("calcular").onclick = calcular;

            function calcular(){

                let num1 = parseFloat(document.getElementById("num1").value);
                let num2 = parseFloat(document.getElementById("num2").value);
                let num3 = parseFloat(document.getElementById("num3").value);


                let notaFinal = ((num1*2) + (num2*3) + (num3*5))/10

                let resultado = document.querySelector('#resultado');
                resultado.innerHTML = "A nota final do aluno é " + notaFinal;

            }


        </script>
</html>
